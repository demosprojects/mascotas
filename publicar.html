<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar - Buscando Mi Mascota</title>
      <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#14b8a6',
                            600: '#0d9488',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="buscar.html" class="flex items-center text-slate-500 hover:text-brand-500 transition-colors">
                <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Regresar
            </a>
            <h1 class="font-title font-bold text-lg text-slate-900">Nuevo aviso</h1>
            <div class="w-20"></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
            
            <p class="text-slate-500 mb-6 text-sm">Completá los datos. Los campos con asterisco (*) son obligatorios.</p>

            <form id="formulario-publicar" class="space-y-6">
                
                <!-- 1. Carga de Imagen -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Foto de la mascota *</label>
                    <!-- Input real oculto -->
                    <input id="foto" name="foto" type="file" class="sr-only" accept="image/*" required>
                    <!-- Zona de drop / clic -->
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-xl hover:border-brand-500 transition-colors bg-slate-50 cursor-pointer" id="zona-drop">
                        <div class="space-y-1 text-center pointer-events-none">
                            <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <p class="text-sm text-brand-600 font-medium">Subir un archivo</p>
                            <p class="text-xs text-slate-500">PNG o JPG hasta 5MB</p>
                        </div>
                    </div>
                    <!-- Vista previa (oculta por defecto) -->
                    <div id="vista-previa" class="hidden mt-3 relative rounded-xl overflow-hidden aspect-[4/3] bg-slate-100">
                        <img id="img-preview" src="" alt="Vista previa" class="object-cover w-full h-full">
                        <button type="button" id="btn-cambiar-foto" class="absolute bottom-2 right-2 bg-slate-900/70 text-white px-3 py-1 rounded-lg text-sm backdrop-blur-sm">Cambiar</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- 2. Tipo de Aviso -->
                    <div>
                        <label for="estado" class="block text-sm font-semibold text-slate-700 mb-2">¿Qué sucedió? *</label>
                        <select id="estado" name="estado" required class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all">
                            <option value="perdido">Perdí mi mascota</option>
                            <option value="encontrado">Encontré una mascota</option>
                            <option value="adopcion">Dar en adopción</option>
                        </select>
                    </div>

                    <!-- 3. Especie -->
                    <div>
                        <label for="especie" class="block text-sm font-semibold text-slate-700 mb-2">Especie *</label>
                        <select id="especie" name="especie" required class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all">
                            <option value="perro">Perro</option>
                            <option value="gato">Gato</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- 4. Nombre -->
                    <div>
                        <label for="nombre" class="block text-sm font-semibold text-slate-700 mb-2">Nombre <span class="font-normal text-slate-400">(Opcional)</span></label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Firulais" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all">
                    </div>

                    <!-- 5. Sexo -->
                    <div>
                        <label for="sexo" class="block text-sm font-semibold text-slate-700 mb-2">Sexo *</label>
                        <select id="sexo" name="sexo" required class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all">
                            <option value="macho">Macho</option>
                            <option value="hembra">Hembra</option>
                            <option value="desconocido">No lo sé</option>
                        </select>
                    </div>
                </div>

                <!-- 6. Ubicación -->
                <div>
                    <label for="zona" class="block text-sm font-semibold text-slate-700 mb-2">Zona / Barrio *</label>
                    <input type="text" id="zona" name="zona" placeholder="Ej: Centro, cerca de la plaza" required class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all">
                </div>

                <!-- 7. Contacto (WhatsApp) -->
                <div>
                    <label for="contacto" class="block text-sm font-semibold text-slate-700 mb-2">Tu número de Contacto *</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-3 text-sm text-slate-500 bg-slate-100 border border-r-0 border-slate-300 rounded-l-xl">
                            +54
                        </span>
                        <input type="tel" id="contacto" name="contacto" placeholder="Ej: 3735123456" required class="rounded-none rounded-r-xl bg-slate-50 border border-slate-300 text-slate-900 text-sm focus:ring-brand-500 focus:border-brand-500 block w-full p-3 outline-none transition-all">
                    </div>
                    <p class="text-xs text-slate-500 mt-1">Ingresá el código de área sin el 15.</p>
                </div>

                <!-- 8. Descripción -->
                <div>
                    <label for="descripcion" class="block text-sm font-semibold text-slate-700 mb-2">Descripción extra</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Tenía un collar rojo, es muy asustadizo..." class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3 outline-none transition-all resize-none"></textarea>
                </div>

                <!-- Botón Submit -->
                <button type="submit" id="btn-publicar" class="w-full text-white bg-brand-500 hover:bg-brand-600 focus:ring-4 focus:outline-none focus:ring-brand-300 font-semibold rounded-xl text-lg px-5 py-4 text-center transition-all shadow-md shadow-brand-500/30 mt-4 flex justify-center items-center gap-2">
                    Publicar aviso
                    <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <script type="module" src="publicar.js"></script>
</body>
</html>
